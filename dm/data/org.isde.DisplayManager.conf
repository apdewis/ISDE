<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root and the isde-dm group can own the bus name -->
  <policy user="root">
    <allow own="org.isde.DisplayManager"/>
  </policy>
  <policy group="isde-dm">
    <allow own="org.isde.DisplayManager"/>
  </policy>

  <!-- Allow anyone to call methods (policy enforced in daemon) -->
  <policy context="default">
    <allow send_destination="org.isde.DisplayManager"
           send_interface="org.isde.DisplayManager"/>
  </policy>
</busconfig>
