<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root can own the bus name -->
  <policy user="root">
    <allow own="org.isde.DiskManager"/>
  </policy>

  <!-- Allow anyone to call methods (policy enforced in daemon) -->
  <policy context="default">
    <allow send_destination="org.isde.DiskManager"
           send_interface="org.isde.DiskManager"/>
  </policy>
</busconfig>
