# ISDE global configuration

[session]
window_manager = "isde-wm"
panel = "isde-panel"
file_manager = "isde-fm"
terminal = "isde-term"
lock_timeout = 300

[input]
double_click_ms = 400
mouse_acceleration = 2
mouse_threshold = 4

[keyboard]
repeat_delay = 300
repeat_interval = 30

[appearance]
color_scheme = "default-light"
# cursor_theme = "default"
icon_theme = "isde-standard"

[mount]
mount_base = "/media"
auto_mount = false

[power]
screen_off_sec = 600
idle_suspend_sec = 0
lid_action = "suspend"
profile = "balanced"

[wm.desktops]
rows = 1
columns = 2
